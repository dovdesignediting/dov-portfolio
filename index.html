<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="szG70hq40iku21n_4eIXSeCS-IdLhfkQf_e9V7XjJhU" />
    <meta name="google" content="notranslate">
    <title>דוב עיצוב ופיתוח | Dov Design Studio</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/rsB29YTx/Picsart-26-01-19-19-13-14-199.png">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #09090b; color: #fafafa; overflow-x: hidden; scroll-behavior: smooth; -webkit-user-select: none; user-select: none; }
        .serif { font-family: 'Playfair Display', serif; }
        .brand-logo { height: 45px; width: auto; object-fit: contain; cursor: pointer; }
        .tm-symbol { font-size: 0.35em; vertical-align: super; margin-right: 2px; opacity: 0.8; }
        .masonry-grid { columns: 2; column-gap: 12px; min-height: 200px; }
        @media (min-width: 768px) { .masonry-grid { columns: 3; column-gap: 20px; } }
        .masonry-item { break-inside: avoid; margin-bottom: 12px; position: relative; cursor: pointer; transition: 0.3s; overflow: hidden; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); background: #111; }
        .masonry-item:hover { transform: translateY(-5px); border-color: #f59e0b; }
        .masonry-item img { width: 100%; height: auto; display: block; }
        #lightbox { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #lightbox.active { display: flex; }
        #lightbox-img { max-width: 90%; max-height: 80vh; border-radius: 8px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .banner-wrapper { width: 100%; margin: 3rem 0; display: flex; flex-direction: column; align-items: center; }
        .scrolling-banner { width: 100%; height: 250px; background-size: contain; background-repeat: repeat-x; animation: scroll-bg 40s linear infinite; }
        @keyframes scroll-bg { from { background-position: 0 center; } to { background-position: 1500px center; } }
        .banner-hint { font-size: 10px; background: #f59e0b; color: #000; padding: 4px 12px; border-radius: 20px; margin-bottom: 10px; font-weight: 900; }
        .cat-btn { padding: 8px 18px; font-size: 10px; font-weight: 900; border: 1px solid #27272a; color: #71717a; border-radius: 50px; transition: 0.3s; }
        .cat-btn.active { border-color: #f59e0b; color: #000; background: #f59e0b; }
        .service-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 2rem; border-radius: 24px; transition: 0.3s; }
        .service-card:hover { border-color: #f59e0b; background: rgba(245, 158, 11, 0.05); }
        .btn-shiny { position: relative; overflow: hidden; }
        .btn-shiny::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent); transform: rotate(45deg); animation: shine 4s infinite; }
        @keyframes shine { 0% { left: -100%; } 20% { left: 100%; } 100% { left: 100%; } }
        #budget-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(15px); padding: 20px; }
        #budget-modal.active { display: flex; }
        .budget-container { width: 100%; max-width: 650px; background: #0c0c0e; border: 1px solid rgba(255,255,255,0.1); border-radius: 32px; padding: 35px; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .budget-scroll { max-height: 400px; overflow-y: auto; padding-right: 10px; margin: 20px 0; }
        .budget-scroll::-webkit-scrollbar { width: 4px; }
        .budget-scroll::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 10px; }
        .budget-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid transparent; border-radius: 16px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .budget-item.selected { border-color: #f59e0b; background: rgba(245, 158, 11, 0.08); }
        .checkbox-custom { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .budget-item.selected .checkbox-custom { background: #f59e0b; border-color: #f59e0b; }
        .budget-item.selected .checkbox-custom::after { content: '✓'; color: #000; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body class="notranslate" oncontextmenu="return false;">
    <div id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""></div>
    <div id="budget-modal">
        <div class="budget-container">
            <button onclick="closeBudgetModal()" class="absolute top-6 right-6 text-zinc-500 hover:text-white text-3xl">&times;</button>
            <h2 class="text-3xl font-black text-amber-500 mb-2 serif italic" data-he="מערכת תקציב" data-en="BUDGET SYSTEM">מערכת תקציב</h2>
            <div class="budget-scroll"><div id="services-list"></div></div>
            <div class="border-t border-white/10 pt-6 mt-4 flex flex-col sm:flex-row items-center justify-between gap-6">
                <div><span class="text-zinc-400 text-xs uppercase tracking-widest block mb-1" data-he="סה''כ מוערך" data-en="ESTIMATED TOTAL">סה"כ מוערך</span><span id="total-price-display" class="text-4xl font-black text-white">$0</span></div>
                <button id="wa-budget-btn" onclick="sendBudgetToWhatsApp()" class="w-full sm:w-auto px-10 py-4 bg-green-600 text-white font-black rounded-2xl flex items-center justify-center gap-3 opacity-30 pointer-events-none transition-all"><span>WhatsApp</span></button>
            </div>
        </div>
    </div>
    <header class="fixed top-0 inset-x-0 z-50 py-4 px-6 bg-black/80 backdrop-blur-md border-b border-white/5">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileMenu()" class="md:hidden text-white"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"></path></svg></button>
                <img src="https://i.postimg.cc/rsB29YTx/Picsart-26-01-19-19-13-14-199.png" class="brand-logo" onclick="showPage('home')">
            </div>
            <nav class="hidden md:flex gap-6 text-[10px] font-black uppercase tracking-widest">
                <button onclick="showPage('home')" data-he="בית" data-en="HOME">בית</button>
                <button onclick="showPage('process')" data-he="תהליך" data-en="PROCESS">תהליך</button>
                <button onclick="showPage('gallery')" data-he="עבודות" data-en="WORKS">עבודות</button>
                <button onclick="showPage('blog')" data-he="בלוג" data-en="BLOG">בלוג</button>
                <button onclick="showPage('faq')" data-he="שאלות" data-en="FAQ">שאלות</button>
                <button onclick="scrollToSection('contact-section')" data-he="צור קשר" data-en="CONTACT">צור קשר</button>
            </nav>
            <button onclick="toggleLang()" class="bg-white/5 px-4 py-2 rounded-full border border-white/10 text-[10px] font-black uppercase" id="lang-label">English</button>
        </div>
    </header>
    <main id="home-page" class="page active">
        <section class="min-h-screen flex flex-col items-center justify-center pt-24 text-center px-6">
            <h1 class="text-6xl md:text-8xl font-black mb-6 serif tracking-tighter" data-he='דוב עיצוב ופיתוח<span class="tm-symbol">TM</span>' data-en='DOV DESIGN STUDIO<span class="tm-symbol">TM</span>'>דוב עיצוב ופיתוח<span class="tm-symbol">TM</span></h1>
            <div class="flex flex-col sm:flex-row gap-4 mb-10">
                <button onclick="showPage('gallery')" class="btn-shiny bg-amber-500 text-black px-10 py-4 font-black text-xs uppercase tracking-widest rounded-xl" data-he="צפה בתיק עבודות" data-en="VIEW PORTFOLIO">צפה בתיק עבודות</button>
                <button onclick="openBudgetModal()" class="border border-white/20 px-10 py-4 font-black text-xs uppercase tracking-widest rounded-xl flex items-center gap-2 justify-center" data-he="🎯 מערכת תקציב" data-en="🎯 BUDGET SYSTEM">🎯 מערכת תקציב</button>
            </div>
            <div id="wrapper-he" class="banner-wrapper"><span class="banner-hint" data-he="לחצו לצפייה מלאה" data-en="FULL VIEW">לחצו לצפייה מלאה</span><div class="scrolling-banner" style="background-image: url('https://i.postimg.cc/SKdWvXvD/Picsart-26-01-15-07-34-38-017.png');"></div></div>
        </section>
        <main id="process-page" class="page pt-32 pb-20"><div class="container mx-auto px-6 text-center"><h2 class="text-5xl font-black mb-12 serif italic" data-he="תהליך העבודה" data-en="PROCESS">תהליך העבודה</h2></div></main>
        <main id="gallery-page" class="page pt-32 pb-20"><div class="container mx-auto px-6 text-center"><h2 class="text-5xl font-black mb-12 serif italic" data-he="תיק עבודות" data-en="PORTFOLIO">תיק עבודות</h2><div id="gallery-grid" class="masonry-grid"></div></div></main>
        <footer class="py-20 text-center border-t border-white/5 bg-black">
            <section id="contact-section" class="pb-12 px-6 max-w-2xl mx-auto">
                <form action="https://formspree.io/f/mvzzqrnz" method="POST" class="space-y-4">
                    <input type="text" name="name" required placeholder="שם מלא" data-he="שם מלא" data-en="Full Name" class="w-full bg-zinc-900 border border-white/10 p-5 rounded-2xl outline-none text-white">
                    <button type="submit" class="w-full py-5 bg-amber-500 text-black font-black uppercase rounded-2xl" data-he="שלח הודעה" data-en="SEND">שלח הודעה</button>
                </form>
            </section>
            <p class="text-amber-500 font-black italic text-2xl mb-4">יחי המלך המשיח!</p>
            <p class="text-[10px] text-zinc-600 uppercase">© 2026 DOV DESIGN & DEVELOPMENT™ | כל הזכויות שמורות ל- <a href="https://dov-portfolio.vercel.app">דוב עיצוב ופיתוח</a></p>
        </footer>
    </main>
    <script>
        let currentLang = 'he';
        let selectedServices = [];

        const services = [
            // שירותי ליבה
            { id: 'logo', he: 'חבילת לוגו ומיתוג', en: 'Logo & Branding', price: 500, desc: 'עיצוב לוגו מקורי (3 סקיצות).', desc_en: 'Original logo (3 sketches).' },
            { id: 'card', he: 'חבילת "כרטיס מנצח"', en: 'Business Card', price: 150, desc: 'עיצוב כרטיס ביקור דו-צדדי.', desc_en: 'Double-sided design.' },
            { id: 'website_pro', he: 'אתר עסקי Premium', en: 'Pro Website', price: 2500, desc: 'פיתוח Custom Code מלא.', desc_en: 'Full custom code.' },
            
            // המרכיבים החדשים שהוספנו למערכת
            { id: 'warranty', he: 'אחריות על פיתוח (באגים)', en: 'Dev Warranty (Bugs)', price: 0, desc: 'אחריות מלאה על תקינות הקוד ללא הגבלת זמן.', desc_en: 'Full code warranty - no time limit.' },
            { id: 'retainer', he: 'תחזוקה חודשית (ריטיינר)', en: 'Monthly Maintenance', price: 250, desc: 'עדכונים, אבטחה ותמיכה שוטפת.', desc_en: 'Updates & security.' },
            { id: 'copyright', he: 'זכויות יוצרים מלאות', en: 'Full Copyright', price: 0, desc: 'כל הקבצים והקוד עוברים לבעלות הלקוח.', desc_en: 'Customer owns everything.' },
            { id: 'accessibility_sys', he: 'הנגשת אתר (AA)', en: 'Accessibility (AA)', price: 300, desc: 'התאמה מלאה לתקני נגישות.', desc_en: 'Full accessibility compliance.' },
            
            // שאר השירותים
            { id: 'landing', he: 'דף נחיתה', en: 'Landing Page', price: 500, desc: 'עמוד ממוקד מכירות.', desc_en: 'Sales focused page.' },
            { id: 'ecommerce', he: 'חנות אונליין', en: 'E-Commerce', price: 1500, desc: 'חנות וירטואלית עם סליקה.', desc_en: 'Online store.' },
            { id: 'seo', he: 'אופטימיזציה ו-SEO', en: 'SEO', price: 350, desc: 'שיפור טכני למנועי חיפוש.', desc_en: 'Technical SEO.' }
        ];

        const works = [
            {url: 'https://i.postimg.cc/fT3SF1hz/Picsart-25-08-30-21-41-32-973.png', cat: 'ads'},
            {url: 'https://i.postimg.cc/66bGMtFN/1767556230317.png', cat: 'ads'},
            {url: 'https://i.postimg.cc/wTtRPndv/1756004839008.png', cat: 'branding'},
            {url: 'https://i.postimg.cc/05XJVPh1/IMG-20251228-WA0014.jpg', cat: 'branding'}
        ];

        function openBudgetModal() { document.getElementById('budget-modal').classList.add('active'); renderBudgetServices(); }
        function closeBudgetModal() { document.getElementById('budget-modal').classList.remove('active'); }

        function renderBudgetServices() {
            const list = document.getElementById('services-list');
            list.innerHTML = '';
            services.forEach(s => {
                const isSelected = selectedServices.includes(s.id);
                const item = document.createElement('div');
                item.className = `budget-item ${isSelected ? 'selected' : ''}`;
                item.onclick = () => toggleService(s.id);
                item.innerHTML = `
                    <div class="flex items-start gap-4 ${currentLang === 'he' ? 'text-right' : 'text-left'}">
                        <div class="checkbox-custom shrink-0 mt-1"></div>
                        <div>
                            <span class="text-sm font-bold block">${currentLang === 'he' ? s.he : s.en}</span>
                            <span class="text-[10px] text-zinc-500 block mt-1">${currentLang === 'he' ? s.desc : s.desc_en}</span>
                        </div>
                    </div>
                    <span class="font-black text-amber-500 shrink-0 ml-4 text-lg">${s.price > 0 ? '$' + s.price : 'חינם'}</span>
                `;
                list.appendChild(item);
            });
            updateTotal();
        }

        function toggleService(id) {
            selectedServices = selectedServices.includes(id) ? selectedServices.filter(sid => sid !== id) : [...selectedServices, id];
            renderBudgetServices();
        }

        function updateTotal() {
            const total = services.filter(s => selectedServices.includes(s.id)).reduce((acc, curr) => acc + curr.price, 0);
            document.getElementById('total-price-display').innerText = `$${total}`;
            const btn = document.getElementById('wa-budget-btn');
            selectedServices.length > 0 ? btn.classList.remove('opacity-30', 'pointer-events-none') : btn.classList.add('opacity-30', 'pointer-events-none');
        }

        function sendBudgetToWhatsApp() {
            const selected = services.filter(s => selectedServices.includes(s.id)).map(s => s.he).join(', ');
            const total = services.filter(s => selectedServices.includes(s.id)).reduce((acc, curr) => acc + curr.price, 0);
            const message = `היי דוב, בחרתי את השירותים הבאים: ${selected}. סה"כ מוערך: $${total}.`;
            window.open(`https://wa.me/972559646422?text=${encodeURIComponent(message)}`, '_blank');
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId + '-page').classList.add('active');
            window.scrollTo(0, 0);
            if(pageId === 'gallery') renderGallery();
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            if (!grid) return;
            grid.innerHTML = '';
            works.forEach(w => {
                const div = document.createElement('div');
                div.className = 'masonry-item';
                div.innerHTML = `<img src="${w.url}" loading="lazy">`;
                grid.appendChild(div);
            });
        }

        function toggleLang() {
            currentLang = currentLang === 'he' ? 'en' : 'he';
            document.documentElement.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            document.querySelectorAll('[data-he]').forEach(el => {
                const text = el.getAttribute('data-' + currentLang);
                el.innerHTML = text;
            });
            if (document.getElementById('budget-modal').classList.contains('active')) renderBudgetServices();
        }
    </script>
</body>
</html>
